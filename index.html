transparent;padding:6px;font-size:18px}.grid{display:grid;gap:18px}.stats{grid-template-columns:repeat(4,1fr);margin-bottom:24px}.card{background:var(--surface);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}.stat{padding:19px}.stat .num{font:700 31px "Playfair Display",serif}.stat span{color:var(--muted);font-size:13px}.panel{padding:22px;margin-bottom:20px}.panel h3{font:700 21px "Playfair Display",serif;margin:0 0 15px}.weekstrip{grid-template-columns:repeat(7,1fr)}.daymini{background:var(--surface2);border-radius:12px;padding:12px;min-height:90px}.daymini b{display:block;font-size:12px;color:var(--muted);margin-bottom:8px}.meal-pill{background:var(--greenSoft);color:var(--green);border-radius:8px;padding:6px 8px;font-size:12px;font-weight:700;margin-top:4px}.recipes{grid-template-columns:repeat(3,minmax(0,1fr))}.recipe-card{overflow:hidden;position:relative}.food-art{height:145px;display:grid;place-items:center;font-size:58px;background:linear-gradient(135deg,var(--soft),var(--greenSoft))}.recipe-body{padding:17px}.recipe-body h3{font:700 20px "Playfair Display",serif;margin:3px 0 7px}.meta{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px}.badge{display:inline-flex;padding:3px 8px;border-radius:99px;background:var(--soft);color:var(--primary);font-size:11px;font-weight:700}.recipe-actions{display:flex;justify-content:space-between;align-items:center;margin-top:13px}.filters{display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:10px;margin-bottom:20px}.input,select,textarea{width:100%;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:10px 12px;outline:none}.input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--soft)}label{display:block;font-weight:700;font-size:13px;margin-bottom:6px}.formgrid{grid-template-columns:repeat(2,1fr)}.field.full{grid-column:1/-1}.checks{display:flex;gap:12px;flex-wrap:wrap}.checks label{font-weight:500}.dynamic-row const recipesSeed=[
{id:"miso-salmon",title:"Miso Glazed Salmon",cat:"Dinner",emoji:"🍣",desc:"Caramelised, savoury-sweet salmon with crisp greens and steamed rice.",prep:10,cook:12,servings:2,rating:5,made:8,fav:true,flags:["Gluten-Free"],tags:["weeknight","quick"],ingredients:[["2","tbsp","white miso paste"],["1","tbsp","maple syrup"],["1","tbsp","rice vinegar"],["1","tsp","sesame oil"],["2","whole","salmon fillets","about 160 g each"],["1","tsp","sesame seeds"],["2","whole","spring onions","thinly sliced"]],steps:["Heat the oven to 220°C. Line a small tray with baking paper.","Mix miso, maple syrup, rice vinegar and sesame oil until smooth.","Pat the salmon dry, place skin-side down and brush generously with glaze.","Roast for 9–12 minutes, until just cooked and glossy. Finish under the grill for 1 minute if desired.","Scatter with sesame seeds and spring onion. Serve with rice and steamed greens."]},
{id:"bolognese",title:"Sunday Bolognese",cat:"Batch Cook",emoji:"🍝",desc:"A slow, rich ragù built with vegetables, beef, tomato and milk.",prep:20,cook:120,servings:8,rating:5,made:12,fav:true,tags:["batch cook","freezer friendly"],ingredients:[["2","tbsp","olive oil"],["1","whole","brown onion","finely diced"],["1","whole","carrot","finely diced"],["2","whole","celery stalks","finely diced"],["3","whole","garlic cloves","minced"],["750","g","beef mince"],["2","tbsp","tomato paste"],["800","g","crushed tomatoes"],["1","cup","beef stock"],["0.5","cup","milk"],["1","tsp","dried oregano"],["500","g","tagliatelle"],["1","pinch","salt and black pepper"]],steps:["Heat oil in a heavy pot. Cook onion, carrot and celery with a pinch of salt for 10 minutes.","Add garlic and cook for 30 seconds. Add beef and brown well, breaking up any large pieces.","Stir in tomato paste for 2 minutes, then add tomatoes, stock and oregano.","Simmer uncovered on very low heat for 90 minutes, stirring occasionally.","Stir in milk and simmer for 15 minutes. Season. Toss with cooked pasta and a splash of pasta water."]},
{id:"chickpea-bowl",title:"Crispy Chickpea Grain Bowl",cat:"Lunch",emoji:"🥗",desc:"A colourful meal-prep bowl with spiced chickpeas, quinoa and lemon tahini.",prep:15,cook:25,servings:4,rating:4,made:7,fav:false,flags:["Vegan","Gluten-Free","Dairy-Free"],tags:["meal prep","plant based"],ingredients:[["400","g","canned chickpeas","drained and dried"],["1","tbsp","olive oil"],["1","tsp","smoked paprika"],["0.5","tsp","ground cumin"],["1","cup","quinoa","rinsed"],["2","cups","water"],["1","whole","cucumber","chopped"],["250","g","cherry tomatoes","halved"],["2","cups","baby spinach"],["3","tbsp","tahini"],["1","whole","lemon","juiced"],["2","tbsp","water"],["1","pinch","salt"]],steps:["Heat oven to 210°C. Toss chickpeas with oil, paprika, cumin and salt. Roast 20–25 minutes.","Combine quinoa and water in a saucepan. Bring to a boil, cover and simmer for 15 minutes. Rest 5 minutes.","Whisk tahini, lemon juice, water and a pinch of salt into a pourable dressing.","Divide spinach, quinoa, cucumber and tomatoes between bowls. Add chickpeas and drizzle with dressing."]},
{id:"banana-bread",title:"Classic Banana Bread",cat:"Baking",emoji:"🍌",desc:"Tender, deeply banana-flavoured loaf with a crackly cinnamon top.",prep:15,cook:55,servings:10,rating:5,made:6,fav:true,flags:["Vegetarian"],tags:["weekend","snack"],ingredients:[["3","whole","very ripe bananas","mashed"],["115","g","unsalted butter","melted"],["150","g","brown sugar"],["2","whole","eggs"],["1","tsp","vanilla extract"],["190","g","plain flour"],["1","tsp","bicarbonate of soda"],["1","tsp","ground cinnamon"],["0.5","tsp","salt"],["80","g","walnuts","optional, chopped"]],steps:["Heat oven to 175°C. Grease and line a 22 x 12 cm loaf tin.","Whisk banana, melted butter, sugar, eggs and vanilla.","In another bowl, combine flour, bicarbonate of soda, cinnamon and salt.","Fold dry ingredients into wet just until no flour pockets remain. Fold in walnuts.","Bake 50–60 minutes, until a skewer comes out with a few moist crumbs. Cool 15 minutes before lifting out."]},
{id:"pumpkin-soup",title:"Roasted Pumpkin Soup",cat:"Soups",emoji:"🥣",desc:"Silky roasted pumpkin soup with ginger, coconut and warming spice.",prep:15,cook:45,servings:6,rating:5,made:6,fav:false,flags:["Vegan","Gluten-Free","Dairy-Free"],tags:["batch cook","freezer friendly"],ingredients:[["1.5","kg","pumpkin","peeled and cubed"],["1","whole","brown onion","cut into wedges"],["3","whole","garlic cloves"],["2","tbsp","olive oil"],["1","tsp","ground cumin"],["1","tsp","ground coriander"],["1","tbsp","fresh ginger","grated"],["4","cups","vegetable stock"],["400","ml","coconut milk"],["1","pinch","salt and pepper"]],steps:["Heat oven to 210°C. Toss pumpkin, onion and garlic with oil, cumin, coriander, salt and pepper.","Roast for 30–35 minutes until deeply golden and tender.","Transfer to a pot with ginger and stock. Simmer for 10 minutes.","Blend until completely smooth, then stir in coconut milk. Warm gently and adjust seasoning."]},
{id:"shakshuka",title:"Weeknight Shakshuka",cat:"Breakfast",emoji:"🍳",desc:"Eggs gently poached in a smoky tomato and capsicum sauce.",prep:10,cook:25,servings:4,rating:5,made:7,fav:true,flags:["Vegetarian","Gluten-Free"],tags:["one pan","weeknight"],ingredients:[["1","tbsp","olive oil"],["1","whole","red capsicum","sliced"],["1","whole","brown onion","sliced"],["3","whole","garlic cloves","minced"],["1","tsp","ground cumin"],["1","tsp","smoked paprika"],["800","g","crushed tomatoes"],["4","whole","eggs"],["80","g","feta","crumbled"],["0.25","cup","parsley","chopped"],["1","pinch","salt and pepper"]],steps:["Heat oil in a wide frying pan. Cook capsicum and onion for 8 minutes until soft.","Add garlic and spices; stir for 30 seconds. Add tomatoes and simmer 10 minutes until thickened.","Make four wells in the sauce and crack in the eggs. Cover and cook 5–7 minutes, until whites set but yolks remain soft.","Season and scatter with feta and parsley. Serve with toasted bread."]},

function recipeCard(r){return `<article class="card recipe-card"><div class="food-art ${r.photo?"has-photo":""}" ${r.photo?`style="background-image:url('${r.photo}')"`:""}>${r.emoji||"🍽️"}</div><div class="recipe-body"><span class="badge">${esc(r.cat)}</span><h3>${esc(r.title)}</h3><div class="meta"><span>★ ${r.rating||"—"}</span><span>◷ ${r.prep+r.cook} min</span><span>Made ${r.made||0}×</span></div><div class="recipe-actions"><button class="iconbtn" onclick="toggleFav('${r.id}')" aria-label="Favourite">${r.fav?"♥":"♡"}</button><button class="btn secondary" onclick="viewRecipe('${r.id}')">View recipe</button></div></div></article>`}
function renderDashboard(){const planned=Object.values(state.planner).reduce((n,d)=>n+Object.keys(d).length,0),fav=state.recipes.filter(r=>r.fav).slice(0,3),mealOrder=["Breakfast","Lunch","Dinner","Snack"],stat=(icon,n,label)=>`<div class="card stat"><div class="stat-icon">${icon}</div><div><div class="num">${n}</div><span>${label}</span></div></div>`;$("#dashboard").innerHTML=`<div class="hero"><div><div class="eyebrow">Welcome back, ${esc(state.profile)}</div><h2>Your kitchen, organised.</h2><p>Keep the recipes you love, make a plan for the week and turn it into one tidy shopping list.</p></div><button class="btn" onclick="showPage('editor')">＋ Add a recipe</button></div><div class="grid stats">${stat("📖",state.recipes.length,"Total recipes")}${stat("🏷️",new Set(state.recipes.map(r=>r.cat)).size,"Categories used")}${stat("👩‍🍳",state.recipes.filter(r=>r.made>0).length,"Recipes made")}${stat("📅",planned,"Meals planned")}</div><div class="card panel"><h3>This week</h3><div class="grid weekstrip">${Object.entries(state.planner).map(([day,meals])=>{const ordered=mealOrder.filter(slot=>meals[slot]).map(slot=>[slot,meals[slot]]);return `<div class="daymini"><b>${day}</b>${ordered.length?ordered.map(([slot,id])=>`<div class="meal-pill ${mealClass(slot)}"><small>${slot}</small><br>${esc(state.recipes.find(r=>r.id===id)?.title||"")}</div>`).join(""):`<button class="btn ghost" onclick="showPage('planner')">＋ Add</button>`}</div>`}).join("")}</div></div><h3 class="section-title" style="font-size:25px">Recently added</h3><div class="grid recipes">${state.recipes.slice(-3).reverse().map(recipeCard).join("")}</div>${fav.length?`<h3 class="section-title" style="font-size:25px;margin-top:30px">Your favourites</h3><div class="grid recipes">${fav.map(recipeCard).join("")}</div>`:""}`}
function renderRecipes(){const cats=[...new Set(state.recipes.map(r=>r.cat))].sort();$("#recipes").innerHTML=`<div class="hero"><div><div class="eyebrow">Your collection</div><h2>My Recipes</h2><p>Search every title, ingredient, tag and note in your vault.</p></div></div><div class="filters"><input class="input" id="search" placeholder="Search recipes or ingredients…"><select id="catFilter"><option value="">All categories</option>${cats.map(c=>`<option>${esc(c)}</option>`).join("")}</select><select id="sort"><option value="new">Newest</option><option value="az">A–Z</option><option value="made">Most made</option><option value="rating">Highest rated</option><option value="quick">Quickest</option></select><button class="btn" onclick="showPage('editor')">＋ Add</button></div><div class="grid recipes" id="recipeGrid"></div>`;$("#search").oninput=filterRecipes;$("#catFilter").onchange=filterRecipes;$("#sort").onchange=filterRecipes;filterRecipes()}
function filterRecipes(){let q=$("#search").value.toLowerCase(),cat=$("#catFilter").value,arr=state.recipes.filter(r=>(!cat||r.cat===cat)&&JSON.stringify(r).toLowerCase().includes(q));const s=$("#sort").value;if(s==="az")arr.sort((a,b)=>a.title.localeCompare(b.title));if(s==="made")arr.sort((a,b)=>b.made-a.made);if(s==="rating")arr.sort((a,b)=>b.rating-a.rating);if(s==="quick")arr.sort((a,b)=>(a.prep+a.cook)-(b.prep+b.cook));$("#recipeGrid").innerHTML=arr.length?arr.map(recipeCard).join(""):`<div class="card empty" style="grid-column:1/-1">No matching recipes found.</div>`}
function toggleFav(id){const r=state.recipes.find(x=>x.id===id);r.fav=!r.fav;save();render($(".page.active").id);toast(r.fav?"Added to favourites":"Removed from favourites")}
function viewRecipe(id){const r=state.recipes.find(x=>x.id===id);openModal(`<div class="recipe-detail"><button class="iconbtn" style="float:right" onclick="closeModal()">✕</button><span class="badge">${esc(r.cat)}</span><h1>${esc(r.title)}</h1><div class="detail-photo" ${r.photo?`style="background-image:url('${r.photo}');font-size:0"`:""}>${r.emoji||"🍽️"}</div><p>${esc(r.desc)}</p>${r.url?`<p><a class="btn secondary" href="${safeUrl(r.url)}" target="_blank" rel="noopener">↗ Open original recipe</a></p>`:""}<div class="meta"><span>Prep ${r.prep} min</span><span>Cook ${r.cook} min</span><span>Serves ${r.servings}</span><span>★ ${r.rating}</span></div><hr style="border:0;border-top:1px solid var(--line);margin:22px 0"><div class="detail-cols"><div><h3>Ingredients</h3><ul>${r.ingredients.map(i=>`<li><b>${esc(i[0])} ${esc(i[1])}</b> ${esc(i[2])}${i[3]?`, ${esc(i[3])}`:""}</li>`).join("")}</ul></div><div><h3>Method</h3><ol>${r.steps.map(s=>`<li style="margin-bottom:12px">${esc(s)}</li>`).join("")}</ol></div></div><div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap" class="no-print"><button class="btn" onclick="markMade('${r.id}')">✓ I made this</button><button class="btn secondary" onclick="editRecipe('${r.id}')">Edit</button><button class="btn secondary" onclick="printRecipe('${r.id}')">Print</button><button class="btn danger" onclick="deleteRecipe('${r.id}')">Delete</button></div></div>`)}

function renderEditor(){const r=editingId?state.recipes.find(x=>x.id===editingId):{title:"",cat:"Dinner",emoji:"🍽️",photo:"",url:"",desc:"",prep:15,cook:30,servings:4,flags:[],tags:[],ingredients:[["","","",""]],steps:[""]};pendingPhoto=r.photo||"";const cats=(state.categories||categories).concat(state.recipes.map(x=>x.cat)).filter((v,i,a)=>a.indexOf(v)===i);$("#editor").innerHTML=`<div class="hero"><div><div class="eyebrow">${editingId?"Update your recipe":"Create something delicious"}</div><h2>${editingId?"Edit Recipe":"Add Recipe"}</h2></div></div><form id="recipeForm"><div class="card panel"><div class="grid formgrid"><div class="field"><label>Recipe title *</label><input class="input" name="title" required value="${esc(r.title)}"></div><div class="field"><label>Category</label><div style="display:flex;gap:8px"><select name="cat" id="recipeCategory">${cats.map(c=>`<option ${c===r.cat?"selected":""}>${esc(c)}</option>`).join("")}</select><button class="btn secondary" type="button" onclick="addCategory()">＋ New</button></div></div><div class="field full"><label>Recipe photo</label><input class="input" id="photoInput" type="file" accept="image/*"><div class="photo-preview" id="photoPreview" ${pendingPhoto?`style="background-image:url('${pendingPhoto}');color:transparent"`:""}>${pendingPhoto?"":"Choose a real-life food photo (compressed automatically)"}</div></div><div class="field full"><label>Recipe URL</label><div style="display:flex;gap:8px"><input class="input" name="url" id="recipeUrl" type="url" placeholder="https://example.com/recipe" value="${esc(r.url||"")}"><button class="btn secondary" type="button" onclick="openRecipeLink()">↗ Open</button><button class="btn secondary" type="button" onclick="searchRecipeWeb()">⌕ Search</button></div></div><div class="field"><label>Tags (comma separated)</label><input class="input" name="tags" value="${esc((r.tags||[]).join(", "))}"></div><div class="field full"><label>Description or story</label><textarea name="desc" rows="3">${esc(r.desc)}</textarea></div><div class="field"><label>Prep time (minutes)</label><input class="input" type="number" min="0" name="prep" value="${r.prep}"></div><div class="field"><label>Cook time (minutes)</label><input class="input" type="number" min="0" name="cook" value="${r.cook}"></div><div class="field"><label>Servings</label><input class="input" type="number" min="1" name="servings" value="${r.servings}"></div><div class="field full"><label>Dietary notes</label><div class="checks">${["Vegetarian","Vegan","Gluten-Free","Dairy-Free","Nut-Free","Keto"].map(f=>`<label><input type="checkbox" name="flags" value="${f}" ${(r.flags||[]).includes(f)?"checked":""}> ${f}</label>`).join("")}</div></div></div></div><div class="card panel"><h3>Ingredients</h3><div id="ingredients">${r.ingredients.map(ingredientRow).join("")}</div><button type="button" class="btn secondary" onclick="addIngredient()">＋ Add ingredient</button></div><div class="card panel"><h3>Method</h3><div id="steps">${r.steps.map(stepRow).join("")}</div><button type="button" class="btn secondary" onclick="addStep()">＋ Add step</button></div><div style="display:flex;gap:10px"><button class="btn" type="submit">Save recipe</button><button class="btn secondary" type="button" onclick="cancelEdit()">Cancel</button></div></form>`;$("#recipeForm").onsubmit=saveRecipe;$("#photoInput").onchange=handlePhoto}
function addCategory(){const name=prompt("New category name:")?.trim();if(!name)return;state.categories=state.categories||[...categories];if(!state.categories.some(c=>c.toLowerCase()===name.toLowerCase()))state.categories.push(name);save();const s=$("#recipeCategory");s.insertAdjacentHTML("beforeend",`<option selected>${esc(name)}</option>`);s.value=name;toast("Category added")}
function handlePhoto(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=x=>{const img=new Image();img.onload=()=>{const canvas=document.createElement("canvas"),max=1000,scale=Math.min(1,max/img.width);canvas.width=img.width*scale;canvas.height=img.height*scale;canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);pendingPhoto=canvas.toDataURL("image/jpeg",.72);$("#photoPreview").style.backgroundImage=`url('${pendingPhoto}')`;$("#photoPreview").textContent=""};img.src=x.target.result};reader.readAsDataURL(file)}

function saveRecipe(e){e.preventDefault();const f=new FormData(e.target),rows=$$(".dynamic-row").map(x=>[x.querySelector(".qty").value,x.querySelector(".unit").value,x.querySelector(".ing").value,x.querySelector(".note").value]).filter(x=>x[2]),steps=$$(".method").map(x=>x.value).filter(Boolean),old=editingId?state.recipes.find(x=>x.id===editingId):null,r={id:editingId||"r"+Date.now(),title:f.get("title"),cat:f.get("cat"),emoji:old?.emoji||"🍽️",photo:pendingPhoto,url:f.get("url")||"",desc:f.get("desc"),prep:+f.get("prep")||0,cook:+f.get("cook")||0,servings:+f.get("servings")||1,flags:f.getAll("flags"),tags:(f.get("tags")||"").split(",").map(x=>x.trim()).filter(Boolean),ingredients:rows,steps,rating:old?.rating||0,made:old?.made||0,fav:old?.fav||false};if(old)Object.assign(old,r);else state.recipes.push(r);save();editingId=null;pendingPhoto="";toast("Recipe saved");showPage("recipes")}
function renderPlanner(){const days=Object.keys(state.planner),slots=["Breakfast","Lunch","Dinner","Snack"];$("#planner").innerHTML=`<div class="hero"><div><div class="eyebrow">Plan with less fuss</div><h2>Weekly Meal Planner</h2><p>Choose recipes for each day, then turn the whole week into a shopping list.</p></div><button class="btn" onclick="generateGrocery()">Generate grocery list</button></div><div class="grid planner">${days.map(day=>`<div class="card planner-day"><h4>${day}</h4>${slots.map(slot=>`<div class="slot ${slot.toLowerCase()}"><label>${slot}</label><select onchange="setMeal('${day}','${slot}',this.value)"><option value="">＋ Add recipe</option>${state.recipes.map(r=>`<option value="${r.id}" ${state.planner[day][slot]===r.id?"selected":""}>${esc(r.title)}</option>`).join("")}</select></div>`).join("")}</div>`).join("")}</div><div class="card panel" style="margin-top:20px"><h3>This week's snapshot</h3><p>${Object.values(state.planner).reduce((n,d)=>n+Object.keys(d).length,0)} meals planned • Approximately ${Object.values(state.planner).flatMap(d=>Object.values(d)).reduce((n,id)=>{const r=state.recipes.find(x=>x.id===id);return n+(r?r.cook:0)},0)} minutes of cooking</p><button class="btn secondary" onclick="autoFill()">Auto-fill empty meals</button> <button class="btn ghost" onclick="clearPlanner()">Clear week</button></div>`}
function setMeal(day,slot,id){if(id)state.planner[day][slot]=id;else delete state.planner[day][slot];save();toast("Meal plan updated")}
function autoFill(){const slots=["Breakfast","Lunch","Dinner","Snack"],matches={Breakfast:["Breakfast","Baking"],Lunch:["Lunch","Salads","Soups"],Dinner:["Dinner","Soups","Batch Cook"],Snack:["Snacks","Baking","Desserts"]};Object.keys(state.planner).forEach((d,di)=>slots.forEach((slot,si)=>{if(!state.planner[d][slot]){const pool=state.recipes.filter(r=>matches[slot].includes(r.cat));if(pool.length)state.planner[d][slot]=pool[(di+si)%pool.length].id}}));save();renderPlanner();toast("All empty meal slots filled")}
function clearPlanner(){if(confirm("Clear every meal from this week?")){Object.keys(state.planner).forEach(d=>state.planner[d]={});save();renderPlanner()}}
const aisle=name=>/onion|garlic|carrot|celery|pumpkin|broccoli|capsicum|zucchini|tomato|cucumber|spinach|lemon|lime|ginger|bean|parsley|basil|berries/i.test(name)?"Produce":/milk|butter|yoghurt|ricotta|feta|egg/i.test(name)?"Dairy & Eggs":/beef|chicken|salmon|fish/i.test(name)?"Meat & Fish":/bread|pasta|flour|oats/i.test(name)?"Bakery & Grains":"Pantry";
function generateGrocery(){const ids=Object.values(state.planner).flatMap(d=>Object.values(d)),map={};ids.forEach(id=>{const r=state.recipes.find(x=>x.id===id);r?.ingredients.forEach(i=>{const k=(i[2]+"|"+i[1]).toLowerCase(),num=parseFloat(i[0]);if(map[k]&&Number.isFinite(num)&&Number.isFinite(parseFloat(map[k].qty)))map[k].qty=String(Math.round((parseFloat(map[k].qty)+num)*100)/100);else if(!map[k])map[k]={id:"g"+Math.random(),qty:i[0],unit:i[1],name:i[2],group:aisle(i[2]),done:false}})});state.grocery=Object.values(map);save();toast("Grocery list generated");showPage("grocery")}
function renderGrocery(){const groups=[...new Set(state.grocery.map(x=>x.group))];$("#grocery").innerHTML=`<div class="hero"><div><div class="eyebrow">Shop once, cook well</div><h2>Grocery List</h2><p>Items generated from your meal plan are grouped by aisle. Add anything else you need.</p></div><button class="btn secondary no-print" onclick="printGrocery()">Print list</button></div><div class="card panel no-print"><form id="addGrocery" style="display:flex;gap:8px"><input class="input" id="newItem" placeholder="Add milk, lemons, coffee…"><button class="btn">＋ Add</button></form></div><div class="grid grocery-groups">${groups.length?groups.map(g=>`<div class="card panel"><h3>${g}</h3>${state.grocery.filter(x=>x.group===g).map(x=>`<div class="grocery-item ${x.done?"done":""}" id="item-${x.id}"><input type="checkbox" ${x.done?"checked":""} onchange="tickItem('${x.id}')"><span><b>${esc(x.qty)} ${esc(x.unit)}</b> ${esc(x.name)}</span><button class="iconbtn no-print" style="margin-left:auto" onclick="editItem('${x.id}')">✎</button><button class="iconbtn no-print" onclick="removeItem('${x.id}')">×</button></div>`).join("")}</div>`).join(""):`<div class="card empty" style="grid-column:1/-1">Your list is empty. Generate it from the meal planner or add an item above.</div>`}</div>${state.grocery.length?`<div class="no-print" style="margin-top:18px"><button class="btn secondary" onclick="clearTicked()">Clear ticked</button> <button class="btn ghost" onclick="copyList()">Copy as text</button></div>`:""}`;$("#addGrocery").onsubmit=e=>{e.preventDefault();const name=$("#newItem").value.trim();if(name){state.grocery.push({id:"g"+Date.now(),qty:"1",unit:"",name,group:aisle(name),done:false});save();renderGrocery()}}}
function editItem(id){const x=state.grocery.find(i=>i.id===id),row=document.getElementById(`item-${id}`);if(!x||!row)return;row.innerHTML=`<div class="edit-item"><input class="input" id="eq-${id}" value="${esc(x.qty)}"><input class="input" id="eu-${id}" value="${esc(x.unit)}"><input class="input" id="en-${id}" value="${esc(x.name)}"><button class="btn" onclick="saveItem('${id}')">Save</button></div>`}
function saveItem(id){const x=state.grocery.find(i=>i.id===id),qty=document.getElementById(`eq-${id}`),unit=document.getElementById(`eu-${id}`),name=document.getElementById(`en-${id}`);if(!x||!qty||!unit||!name)return;x.qty=qty.value;x.unit=unit.value;x.name=name.value.trim()||x.name;x.group=aisle(x.name);save();renderGrocery();toast("Grocery item updated")}
function printGrocery(){document.body.classList.add("print-grocery");window.print();setTimeout(()=>document.body.classList.remove("print-grocery"),500)}
function tickItem(id){const x=state.grocery.find(i=>i.id===id);x.done=!x.done;save();renderGrocery()}function removeItem(id){state.grocery=state.grocery.filter(x=>x.id!==id);save();renderGrocery()}function clearTicked(){state.grocery=state.grocery.filter(x=>!x.done);save();renderGrocery()}function copyList(){navigator.clipboard.writeText(state.grocery.map(x=>`${x.done?"[x]":"[ ]"} ${x.qty} ${x.unit} ${x.name}`).join("\n"));toast("List copied")}
function renderTools(){const r=state.recipes[0];$("#tools").innerHTML=`<div class="hero"><div><div class="eyebrow">Useful at the bench</div><h2>Kitchen Tools</h2><p>Scale a recipe, convert common measures or keep an eye on the oven.</p></div></div><div class="grid tools"><div class="card panel"><h3>Serving size scaler</h3>${r?`<label>Recipe</label><select id="scaleRecipe" onchange="updateScaler()">${state.recipes.map(x=>`<option value="${x.id}">${esc(x.title)}</option>`).join("")}</select><label style="margin-top:12px">Target servings</label><input class="input" id="targetServings" type="number" min="1" value="${r.servings}" oninput="updateScaler()"><div class="result" id="scaled" style="margin-top:15px"></div>`:"<p>Add a recipe to use the scaler.</p>"}</div><div class="card panel"><h3>Measurement converter</h3><div class="grid formgrid"><div><label>Amount</label><input class="input" id="convVal" type="number" value="1" oninput="convert()"></div><div><label>From</label><select id="convFrom" onchange="convert()"><option value="cup">cups</option><option value="tbsp">tbsp</option><option value="tsp">tsp</option><option value="ml">ml</option><option value="oz">oz</option><option value="g">g</option><option value="c">°C</option><option value="f">°F</option></select></div><div><label>To</label><select id="convTo" onchange="convert()"><option value="ml">ml</option><option value="cup">cups</option><option value="tbsp">tbsp</option><option value="tsp">tsp</option><option value="g">g</option><option value="oz">oz</option><option value="f">°F</option><option value="c">°C</option></select></div></div><div class="result" id="convResult" style="margin-top:15px"></div></div><div class="card panel"><h3>Kitchen timer</h3><div class="timer" id="timerDisplay">00:00</div><div style="text-align:center"><button class="btn secondary" onclick="setTimer(300)">5 min</button> <button class="btn secondary" onclick="setTimer(600)">10 min</button> <button class="btn secondary" onclick="setTimer(1800)">30 min</button></div><div style="max-width:230px;margin:14px auto"><label>Custom minutes</label><input class="input" id="customMinutes" type="number" min="0" max="999" step="1" value="15" oninput="setTimer((+this.value||0)*60)"></div><div style="text-align:center;margin-top:12px"><button class="btn" onclick="startTimer()">Start</button> <button class="btn ghost" onclick="pauseTimer()">Pause</button> <button class="btn ghost" onclick="setTimer(0)">Reset</button></div><p style="text-align:center;color:var(--muted);font-size:12px">At zero, the timer sounds three chimes and shows an alert.</p></div><div class="card panel"><h3>Quick reference</h3><table class="table"><tr><th>Need</th><th>Useful swap</th></tr><tr><td>1 cup buttermilk</td><td>1 cup milk + 1 tbsp lemon juice</td></tr><tr><td>1 egg</td><td>1 tbsp chia + 3 tbsp water</td></tr><tr><td>Self-raising flour</td><td>1 cup plain flour + 2 tsp baking powder</td></tr><tr><td>Butter in baking</td><td>Use ¾ quantity neutral oil</td></tr></table><p><b>Safe internal temperatures:</b><br>Chicken 75°C • Fish 63°C • Reheated food 75°C</p></div></div>`;if(r)updateScaler();convert();updateTimer()}
function fmt(n){return Math.round(n*100)/100}
function updateScaler(){const r=state.recipes.find(x=>x.id===$("#scaleRecipe").value),target=+$("#targetServings").value||r.servings,ratio=target/r.servings;$("#scaled").innerHTML=`<b>For ${target} servings</b><ul class="scaled-list">${r.ingredients.map(i=>`<li><b>${isNaN(parseFloat(i[0]))?esc(i[0]):fmt(parseFloat(i[0])*ratio)} ${esc(i[1])}</b> ${esc(i[2])}</li>`).join("")}</ul>`}
function convert(){let v=+$("#convVal").value,from=$("#convFrom").value,to=$("#convTo").value,result;if(from==="c"&&to==="f")result=v*9/5+32;else if(from==="f"&&to==="c")result=(v-32)*5/9;else{const base={cup:250,tbsp:15,tsp:5,ml:1,oz:28.35,g:1};result=base[from]&&base[to]?v*base[from]/base[to]:NaN}$("#convResult").textContent=Number.isFinite(result)?`${v} ${from} = ${fmt(result)} ${to}`:"Choose compatible units"}
function setTimer(s){pauseTimer();timerSeconds=Math.max(0,Math.round(s));updateTimer()}function updateTimer(){const el=$("#timerDisplay");if(el)el.textContent=`${String(Math.floor(timerSeconds/60)).padStart(2,"0")}:${String(timerSeconds%60).padStart(2,"0")}`}function timerChime(){try{const ctx=new (window.AudioContext||window.webkitAudioContext)();[0,.22,.44].forEach((delay,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=[660,880,1040][i];g.gain.setValueAtTime(.001,ctx.currentTime+delay);g.gain.exponentialRampToValueAtTime(.2,ctx.currentTime+delay+.02);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+delay+.2);o.connect(g);g.connect(ctx.destination);o.start(ctx.currentTime+delay);o.stop(ctx.currentTime+delay+.22)})}catch{}}function startTimer(){if(timerHandle||timerSeconds<=0)return;timerHandle=setInterval(()=>{timerSeconds--;updateTimer();if(timerSeconds<=0){pauseTimer();timerChime();alert("Timer finished! Your kitchen awaits.")}},1000)}function pauseTimer(){clearInterval(timerHandle);timerHandle=null}
function renderReports(){const top=[...state.recipes].sort((a,b)=>b.made-a.made).slice(0,5),catCounts=Object.entries(state.recipes.reduce((a,r)=>(a[r.cat]=(a[r.cat]||0)+1,a),{})).sort((a,b)=>b[1]-a[1]),all=state.recipes.flatMap(r=>r.ingredients.map(i=>i[2].toLowerCase())),freq=Object.entries(all.reduce((a,x)=>(a[x]=(a[x]||0)+1,a),{})).sort((a,b)=>b[1]-a[1])[0],avg=state.recipes.length?Math.round(state.recipes.reduce((n,r)=>n+r.prep+r.cook,0)/state.recipes.length):0,stat=(icon,n,label)=>`<div class="card stat"><div class="stat-icon">${icon}</div><div><div class="num" style="${String(n).length>12?"font-size:18px":""}">${n}</div><span>${label}</span></div></div>`;$("#reports").innerHTML=`<div class="hero"><div><div class="eyebrow">A look at your cooking life</div><h2>Reports & Stats</h2><p>Simple insights drawn from the recipes you save and cook.</p></div></div><div class="grid stats">${stat("🍽️",state.recipes.reduce((n,r)=>n+r.made,0),"Total dishes made")}${stat("⏱️",avg,"Average total minutes")}${stat("🏆",esc(catCounts[0]?.[0]||"—"),"Largest category")}${stat("🧄",esc(freq?.[0]||"—"),"Most-used ingredient")}</div><div class="grid tools"><div class="card panel"><h3>Most made recipes</h3>${top.length?top.map((r,i)=>`<div style="margin:12px 0"><div style="display:flex;justify-content:space-between"><b>${i+1}. ${esc(r.title)}</b><span>${r.made}×</span></div><div style="height:8px;background:var(--surface2);border-radius:9px"><div style="height:100%;width:${r.made/(top[0].made||1)*100}%;background:var(--primary);border-radius:9px"></div></div></div>`).join(""):"<p>No cooking history yet.</p>"}</div><div class="card panel"><h3>Recipes by category</h3>${catCounts.map(([c,n])=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line)"><span>${esc(c)}</span><b>${n}</b></div>`).join("")||"<p>No recipes yet.</p>"}</div></div>`}
function renderSettings(){state.categories=normaliseCategories();$("#settings").innerHTML=`<div class="hero"><div><div class="eyebrow">Make it yours</div><h2>Settings</h2><p>Personalise your vault and keep a safe copy of your recipes.</p></div></div><div class="grid settings-grid"><div class="card panel"><h3>Profile</h3><label>Your name</label><input class="input" id="profileName" value="${esc(state.profile)}"><button class="btn" style="margin-top:12px" onclick="saveProfile()">Save profile</button></div><div class="card panel"><h3>Appearance</h3><p>Choose by colour preview.</p><div class="theme-row">${["saffron","rose","midnight","dark"].map(t=>`<button class="swatch swatch-${t}" onclick="setTheme('${t}')" aria-label="${t} theme"><span>${t[0].toUpperCase()+t.slice(1)}</span></button>`).join("")}</div></div><div class="card panel"><h3>Recipe Categories</h3><p>Add, rename or remove the categories shown when creating recipes.</p><form class="category-add" id="categoryForm"><input class="input" id="newCategoryName" placeholder="New category name"><button class="btn">＋ Add</button></form><div class="category-list">${state.categories.map((c,i)=>`<div class="category-item"><span>${esc(c)}</span><button class="btn secondary" type="button" onclick="renameCategory(${i})">Rename</button><button class="btn ghost" type="button" onclick="deleteCategory(${i})">Delete</button></div>`).join("")}</div></div><div class="card panel"><h3>Backup & transfer</h3><p>Download a complete backup before moving devices or clearing browser data.</p><button class="btn" onclick="exportData()">Export JSON</button> <button class="btn secondary" onclick="$('#importFile').click()">Import JSON</button></div><div class="card panel"><h3>Start over</h3><p>Reload the original real-life recipe collection, or reset to an empty vault.</p><button class="btn secondary" onclick="loadDemo()">Restore demo recipes</button> <button class="btn danger" onclick="resetBlank()">Reset to blank</button></div></div>`;$("#categoryForm").onsubmit=e=>{e.preventDefault();createCategory($("#newCategoryName").value)}}
function normaliseCategories(){return [...new Set([...(state.categories||categories),...state.recipes.map(r=>r.cat)].filter(Boolean))]}
function createCategory(raw){const name=raw.trim();if(!name)return;if(state.categories.some(c=>c.toLowerCase()===name.toLowerCase()))return alert("That category already exists.");state.categories.push(name);save();renderSettings();toast("Category added")}
function renameCategory(index){const oldName=state.categories[index],newName=prompt("Rename category:",oldName)?.trim();if(!newName||newName===oldName)return;if(state.categories.some((c,i)=>i!==index&&c.toLowerCase()===newName.toLowerCase()))return alert("That category already exists.");state.categories[index]=newName;state.recipes.forEach(r=>{if(r.cat===oldName)r.cat=newName});save();renderSettings();toast("Category renamed")}
function deleteCategory(index){const name=state.categories[index],used=state.recipes.filter(r=>r.cat===name);if(used.length){const replacement=prompt(`“${name}” is used by ${used.length} recipe${used.length===1?"":"s"}. Enter a replacement category before deleting:`,state.categories.find((c,i)=>i!==index)||"Other")?.trim();if(!replacement||replacement.toLowerCase()===name.toLowerCase())return alert("Choose a different replacement category.");const existing=state.categories.find(c=>c.toLowerCase()===replacement.toLowerCase());const finalName=existing||replacement;if(!existing)state.categories.push(finalName);used.forEach(r=>r.cat=finalName)}else if(!confirm(`Delete the “${name}” category?`))return;state.categories.splice(index,1);save();renderSettings();toast("Category deleted")}
function saveProfile(){state.profile=$("#profileName").value.trim()||"Home Cook";save();toast("Profile saved")}function setTheme(t){if(t!=="dark")state.lastLightTheme=t;state.theme=t;document.documentElement.dataset.theme=t;save();toast(`${t} theme applied`)}
function exportData(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download=`recipe-vault-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href)}
$("#importFile").onchange=e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const x=JSON.parse(reader.result);if(!Array.isArray(x.recipes))throw 0;if(confirm("Replace current data with this backup?")){state=x;save();setTheme(state.theme||"saffron");showPage("dashboard");toast("Backup restored")}}catch{alert("That file is not a valid Recipe Vault backup.")}};reader.readAsText(file)}
function loadDemo(){if(confirm("Restore the starter collection? Your own recipes will be replaced.")){state=structuredClone(defaultState);save();setTheme(state.theme);showPage("dashboard")}}function resetBlank(){if(confirm("Permanently erase all recipes and plans?")&&confirm("Are you absolutely sure? Export a backup first if needed.")){state={...structuredClone(defaultState),recipes:[],planner:{Mon:{},Tue:{},Wed:{},Thu:{},Fri:{},Sat:{},Sun:{}},grocery:[]};save();showPage("dashboard")}}
function renderInstructions(){$("#instructions").innerHTML=`<div class="guide"><div class="hero"><div><div class="eyebrow">A friendly hand</div><h2>How to Use Your Vault</h2><p>Everything is stored privately in this browser. No account, cloud or subscription is required.</p></div></div><details open><summary>Getting started</summary><p>Explore the starter recipes, open one to see the full ingredients and method, then add your own with <b>New recipe</b>. Use Settings to choose your preferred colour theme and name.</p></details><details><summary>Add your first recipe</summary><p>Choose Add Recipe, complete the title, timings and servings, then add as many ingredient and method rows as needed. Quantities should be numbers where possible so the serving scaler can calculate them.</p></details><details><summary>Plan a week and build a grocery list</summary><p>In Meal Planner, select a recipe for any breakfast, lunch, dinner or snack slot. Choose Generate Grocery List. Matching ingredients with the same unit are combined automatically.</p></details><details><summary>Scale a recipe</summary><p>Open Kitchen Tools, select a recipe and enter your target number of servings. Ingredient quantities update instantly from the original serving size.</p></details><details><summary>Back up or move devices</summary><p>Go to Settings and choose Export JSON. Keep the downloaded file somewhere safe. On another device, open this HTML app, choose Import JSON and select that backup.</p></details><details><summary>Where is my data stored?</summary><p>Your recipes are saved in this browser's local storage. Clearing browser website data may remove them, so make regular JSON backups.</p></details><details><summary>Can I use it offline?</summary><p>Yes. The planner, recipes and tools work from the single HTML file. The optional web fonts fall back gracefully when you are offline.</p></details><details><summary>Printing</summary><p>Use your browser's print command for grocery lists and recipe views. For the cleanest result, disable browser headers and footers in the print dialog.</p></details></div>`}
function unlockGate(){sessionStorage.setItem("rvp_unlocked","1");$("#accessGate").classList.add("hidden");renderDashboard()}
$("#gateForm").onsubmit=e=>{e.preventDefault();if($("#gatePassword").value==="RV2026")unlockGate();else{$("#gateError").textContent="Incorrect password. Please try again.";$("#gatePassword").select()}};
document.documentElement.dataset.theme=state.theme||"saffron";
if(sessionStorage.getItem("rvp_unlocked")==="1")$("#accessGate").classList.add("hidden");
renderDashboard();
</script>
</body>
